version: '3'

tasks:
  install:
    desc: Symlink all skills and agents into ~/.claude and ~/.gemini
    deps: [install:claude, install:gemini]

  clean:stale:
    internal: true
    desc: Remove stale symlinks in ~/.claude and ~/.gemini pointing to this repo
    cmds:
      - |
        repo="$(pwd)"
        remove_stale() {
          local f="$1"
          if [ -L "$f" ] && [ ! -e "$f" ]; then
            target="$(readlink "$f")"
            case "$target" in "$repo"/*) rm -f "$f"; echo "REMOVED $f" ;; esac
          fi
        }
        for f in "$HOME/.claude/commands/"*.md; do remove_stale "$f"; done
        remove_stale "$HOME/.claude/settings.json"
        for f in "$HOME/.claude/agents/gemini-operative/"*.md; do remove_stale "$f"; done
        for dir in "$HOME/.gemini/skills/"/*/; do remove_stale "${dir}SKILL.md"; done
        for f in "$HOME/.gemini/agents/"*.md; do remove_stale "$f"; done

  install:claude:
    desc: Symlink Claude commands and agents into ~/.claude
    deps: [clean:stale]
    cmds:
      - mkdir -p $HOME/.claude/commands
      - |
        for f in .claude/commands/*.md; do
          ln -sf "$(pwd)/$f" "$HOME/.claude/commands/$(basename $f)"
        done
      - |
        if [ -f ".claude/settings.json" ]; then
          ln -sf "$(pwd)/.claude/settings.json" "$HOME/.claude/settings.json"
          echo "LINKED settings.json"
        fi
      - |
        if command -v gemini >/dev/null 2>&1; then
          mkdir -p "$HOME/.claude/agents/gemini-operative"
          ln -sf "$(pwd)/.claude/agents/gemini-operative/AGENT.md" "$HOME/.claude/agents/gemini-operative/AGENT.md"
          echo "LINKED gemini-operative agent"
        else
          echo "SKIP gemini-operative (gemini not found)"
        fi

  install:gemini:
    desc: Symlink Gemini skills and agents into ~/.gemini
    deps: [clean:stale]
    cmds:
      - |
        for dir in .gemini/skills/*/; do
          name=$(basename "$dir")
          mkdir -p "$HOME/.gemini/skills/$name"
          ln -sf "$(pwd)/${dir}SKILL.md" "$HOME/.gemini/skills/$name/SKILL.md"
        done
      - |
        if command -v claude >/dev/null 2>&1; then
          mkdir -p "$HOME/.gemini/agents"
          for f in .gemini/agents/*.md; do
            ln -sf "$(pwd)/$f" "$HOME/.gemini/agents/$(basename $f)"
          done
          echo "LINKED claude agents"
        else
          echo "SKIP claude agents (claude not found)"
        fi

  verify:
    desc: Verify all skills and agents are installed
    cmds:
      - |
        failed=0
        check() {
          if [ -e "$1" ]; then
            echo "OK  $1"
          else
            echo "ERR $1"
            failed=1
          fi
        }
        for f in .claude/commands/*.md; do
          check "$HOME/.claude/commands/$(basename $f)"
        done
        if [ -f ".claude/settings.json" ]; then
          check "$HOME/.claude/settings.json"
        fi
        if command -v gemini >/dev/null 2>&1; then
          check "$HOME/.claude/agents/gemini-operative/AGENT.md"
        fi
        for dir in .gemini/skills/*/; do
          check "$HOME/.gemini/skills/$(basename $dir)/SKILL.md"
        done
        if command -v claude >/dev/null 2>&1; then
          for f in .gemini/agents/*.md; do
            check "$HOME/.gemini/agents/$(basename $f)"
          done
        fi
        exit $failed
