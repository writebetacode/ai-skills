version: '3'

tasks:
  install:
    desc: Install all skills, agents, and settings into ~/.claude and ~/.gemini
    deps: [install:claude, install:gemini]

  clean:stale:
    internal: true
    desc: Remove stale symlinks in ~/.claude and ~/.gemini pointing to this repo
    cmds:
      - |
        repo="$(pwd)"
        remove_stale() {
          local f="$1"
          if [ -L "$f" ] && [ ! -e "$f" ]; then
            target="$(readlink "$f")"
            case "$target" in "$repo"/*) rm -f "$f"; echo "REMOVED $f" ;; esac
          fi
        }
        for dir in "$HOME/.claude/skills/"/*/; do remove_stale "${dir}SKILL.md"; done
        for dir in "$HOME/.claude/agents/"/*/; do
          for f in "$dir"*.md; do remove_stale "$f"; done
        done
        for dir in "$HOME/.gemini/skills/"/*/; do remove_stale "${dir}SKILL.md"; done
        for dir in "$HOME/.gemini/agents/"/*/; do
          for f in "$dir"*.md; do remove_stale "$f"; done
        done

  install:claude:
    desc: Symlink skills and agents, merge settings into ~/.claude
    deps: [clean:stale]
    cmds:
      - |
        for dir in skills/*/; do
          name=$(basename "$dir")
          mkdir -p "$HOME/.claude/skills/$name"
          ln -sf "$(pwd)/${dir}SKILL.md" "$HOME/.claude/skills/$name/SKILL.md"
        done
      - |
        if [ -f "claude/settings.json" ]; then
          target="$HOME/.claude/settings.json"
          if [ ! -f "$target" ] || [ -L "$target" ]; then
            rm -f "$target"
            cp "claude/settings.json" "$target"
          else
            jq -s '.[0] as $host | .[1] as $repo | ($host * $repo) | .permissions.allow = ((($host.permissions.allow // []) + ($repo.permissions.allow // [])) | unique) | .permissions.ask = ((($host.permissions.ask // []) + ($repo.permissions.ask // [])) | unique) | .permissions.deny = ((($host.permissions.deny // []) + ($repo.permissions.deny // [])) | unique)' \
              "$target" "claude/settings.json" > "$target.tmp" && mv "$target.tmp" "$target"
          fi
          echo "MERGED settings.json"
        fi
      - |
        for dir in agents/*/; do
          name=$(basename "$dir")
          case "$name" in
            gemini-operative)
              if command -v gemini >/dev/null 2>&1; then
                mkdir -p "$HOME/.claude/agents/$name"
                ln -sf "$(pwd)/${dir}AGENT.md" "$HOME/.claude/agents/$name/AGENT.md"
                echo "LINKED $name agent"
              else
                echo "SKIP $name (gemini not found)"
              fi
              ;;
            claude-operative)
              ;;
            *)
              mkdir -p "$HOME/.claude/agents/$name"
              ln -sf "$(pwd)/${dir}AGENT.md" "$HOME/.claude/agents/$name/AGENT.md"
              echo "LINKED $name agent"
              ;;
          esac
        done

  install:gemini:
    desc: Symlink skills and agents into ~/.gemini
    deps: [clean:stale]
    cmds:
      - |
        for dir in skills/*/; do
          name=$(basename "$dir")
          mkdir -p "$HOME/.gemini/skills/$name"
          ln -sf "$(pwd)/${dir}SKILL.md" "$HOME/.gemini/skills/$name/SKILL.md"
        done
      - |
        if command -v claude >/dev/null 2>&1; then
          mkdir -p "$HOME/.gemini/agents/claude-operative"
          ln -sf "$(pwd)/agents/claude-operative/AGENT.md" "$HOME/.gemini/agents/claude-operative/AGENT.md"
          echo "LINKED claude-operative agent"
        else
          echo "SKIP claude-operative (claude not found)"
        fi

  verify:response-style:
    desc: Verify the shared Response Style block is byte-identical across all skills tagged with response-style:v1
    cmds:
      - |
        canonical=""
        failed=0
        for f in skills/*/SKILL.md; do
          if grep -q "response-style:v1" "$f"; then
            block=$(awk '/<!-- response-style:v1/{flag=1; lines=0; next} flag && lines>0 && /^## /{flag=0} flag{print; lines++}' "$f")
            if [ -z "$canonical" ]; then
              canonical="$block"
              ref="$f"
            elif [ "$block" != "$canonical" ]; then
              echo "DRIFT $f differs from $ref"
              failed=1
            fi
          fi
        done
        if [ $failed -eq 0 ]; then echo "OK response-style block consistent across all tagged skills"; fi
        exit $failed

  verify:
    desc: Verify all skills and agents are installed
    cmds:
      - |
        failed=0
        check() {
          if [ -e "$1" ]; then
            echo "OK  $1"
          else
            echo "ERR $1"
            failed=1
          fi
        }
        for dir in skills/*/; do
          name=$(basename "$dir")
          check "$HOME/.claude/skills/$name/SKILL.md"
          check "$HOME/.gemini/skills/$name/SKILL.md"
        done
        if [ -f "claude/settings.json" ]; then
          if jq -e '.spinnerVerbs' "$HOME/.claude/settings.json" >/dev/null 2>&1; then
            echo "OK  $HOME/.claude/settings.json (merged)"
          else
            echo "ERR $HOME/.claude/settings.json (missing spinnerVerbs)"
            failed=1
          fi
        fi
        for dir in agents/*/; do
          name=$(basename "$dir")
          case "$name" in
            gemini-operative)
              if command -v gemini >/dev/null 2>&1; then
                check "$HOME/.claude/agents/$name/AGENT.md"
              fi
              ;;
            claude-operative)
              if command -v claude >/dev/null 2>&1; then
                check "$HOME/.gemini/agents/$name/AGENT.md"
              fi
              ;;
            *)
              check "$HOME/.claude/agents/$name/AGENT.md"
              ;;
          esac
        done
        exit $failed
